<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YaraT Enterprise Ledger</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --text-light: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        header p { margin: 5px 0 0 0; color: #94a3b8; font-size: 0.9rem; }
        
        .container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }
        .panel {
            background-color: var(--panel-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        h2 { margin-top: 0; font-size: 1.1rem; color: #cbd5e1; }
        
        textarea {
            flex: 1;
            background-color: #0b1120;
            color: #38bdf8;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        
        button {
            margin-top: 15px;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #059669; }
        
        #output-area {
            background-color: #0b1120;
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .metric { color: #94a3b8; margin-bottom: 10px; font-size: 0.85rem; }
        .success-text { color: var(--accent-green); }
        .error-text { color: var(--accent-red); }
        .ledger-key { color: #cbd5e1; }
        .ledger-val { color: #fde047; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🏦 YaraT Financial Engine</h1>
        <p>Live Web API Dashboard • Connected to 127.0.0.1:8080</p>
    </header>

    <div class="container">
        <div class="panel">
            <h2>Ledger Script</h2>
            <textarea id="code-input">
// Initialize System
asset KES = Fiat(precision: 2)

// Set Balances
treasury_vault = 1000000.00 KES
daily_expenses = 45500.00 KES

// Process
remaining_budget = treasury_vault - daily_expenses
audit_passed = true
            </textarea>
            <button onclick="executeContract()">▶ Run Transaction</button>
        </div>

        <div class="panel">
            <h2>Final Memory State</h2>
            <div id="output-area">Waiting for transaction...</div>
        </div>
    </div>

    <script>
        async function executeContract() {
            const code = document.getElementById('code-input').value;
            const outputArea = document.getElementById('output-area');
            
            outputArea.innerHTML = "<span class='metric'>Transmitting to YaraT Engine...</span>";

            try {
                // Fire the HTTP POST request to your Actix-Web server
                const response = await fetch('https://verbose-lamp-pw9ww55jg592795p-8080.app.github.dev/api/v1/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();

                // Format the UI based on the exact JSON schema we built in Rust
                if (data.success) {
                    let html = `<div class="metric success-text">✓ Execution Successful (${data.execution_time_ms} ms)</div>\n\n`;
                    
                    // Sort the memory state alphabetically for a clean ledger view
                    const sortedKeys = Object.keys(data.memory_state).sort();
                    sortedKeys.forEach(key => {
                        html += `<span class="ledger-key">[${key}]</span> => <span class="ledger-val">${data.memory_state[key]}</span>\n`;
                    });
                    
                    outputArea.innerHTML = html;
                } else {
                    let html = `<div class="metric error-text">❌ Audit or Execution Failed (${data.execution_time_ms} ms)</div>\n\n`;
                    html += `<span class="error-text">${data.error_details}</span>`;
                    outputArea.innerHTML = html;
                }

            } catch (error) {
                outputArea.innerHTML = `
                    <span class="error-text">❌ Network Error</span>\n
                    Could not connect to the YaraT API.\n
                    Make sure you ran 'cargo run -- serve' in your terminal!
                `;
            }
        }
    </script>

</body>
</html>
